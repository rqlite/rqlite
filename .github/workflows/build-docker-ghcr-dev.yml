name: docker-ghcr-dev-build-and-push

on:
  workflow_dispatch:

env:
  REGISTRY_IMAGE: rqlite/rqlite

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Get current date
        run: echo "date=$(date +'%Y-%m-%dT%T%z')" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute GHCR image name
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "GHCR_IMAGE=ghcr.io/${owner}/rqlite" >> $GITHUB_ENV

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:dev
            ${{ env.GHCR_IMAGE }}:dev
          labels: ${{ steps.meta.outputs.labels }}
          annotations: |
            index:org.opencontainers.image.description=rqlite is a lightweight, fault-tolerant database built on SQLite. It's designed to keep your data highly available with minimal effort.
          build-args: |
            VERSION=dev
            COMMIT=${{ github.sha }}
            BRANCH=${{ github.ref_name }}
            DATE=${{ env.date }}
